site_name: 知识付费工作室
site_description: 知识付费内容站
site_url: https://aimarvin.de5.net
site_author: fengzhongss

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - toc:
      permalink: true
      title: 目录
  - attr_list
  - footnotes

plugins:
  - search:
      lang: zh

extra:
  generator: false

copyright: Copyright &copy; 2026 知识付费工作室

nav:
  - 首页: index.md
  - 作品: 作品/index.md
  - 选题: 选题/index.md
  - 调研: 调研/index.md

exclude_docs: |
  模板/
  .obsidian/
