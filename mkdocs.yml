site_name: 知识付费工作室
site_description: 知识付费内容站
site_url: https://aimarvin.de5.net
site_author: fengzhongss

theme:
  name: material
  language: zh
  font: false
  icon:
    logo: material/book-open-variant
  features:
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - toc:
      permalink: true
      title: 目录
  - attr_list
  - footnotes

plugins:
  - search:
      lang: zh

extra:
  generator: false

copyright: Copyright &copy; 2026 知识付费工作室

nav:
  - 首页: index.md
  - 作品库: 作品库/index.md
  - 素材库: 素材库/index.md

exclude_docs: |
  模板/
  .obsidian/
  欢迎.md
